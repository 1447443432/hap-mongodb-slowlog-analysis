name: Release Skill

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v1.1.1"
        required: true
      release_name:
        description: "Release title"
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate MCP server
        run: npm run check

      - name: Validate skill rules
        shell: pwsh
        run: .\scripts\validate-skill.ps1

      - name: Test install into temporary Codex home
        shell: pwsh
        run: .\scripts\test-install.ps1

      - name: Package skill
        shell: pwsh
        run: .\scripts\package-skill.ps1

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "tag_name=${{ github.event.inputs.tag_name }}" >> $env:GITHUB_OUTPUT
            "release_name=${{ github.event.inputs.release_name }}" >> $env:GITHUB_OUTPUT
          } else {
            $tag = "${{ github.ref_name }}"
            "tag_name=$tag" >> $env:GITHUB_OUTPUT
            "release_name=$tag" >> $env:GITHUB_OUTPUT
          }

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          generate_release_notes: true
          target_commitish: ${{ github.sha }}
          files: |
            dist/hap-mongodb-slowlog-analysis-skill-upload.zip
